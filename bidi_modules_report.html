let sortKey = 'module', sortAsc = true, filterKind = 'all', searchQ = '';

function sortBy(key) {
  if (sortKey === key) sortAsc = !sortAsc; else { sortKey = key; sortAsc = true; }
  document.querySelectorAll('th').forEach(th => th.classList.remove('sorted'));
  document.getElementById('th-' + key)?.classList.add('sorted');
  render();
}

function render() {
  searchQ = document.getElementById('search').value.toLowerCase();
  let rows = DATA.filter(r => {
    if (filterKind !== 'all' && r.kind !== filterKind) return false;
    if (searchQ && !r.module.toLowerCase().includes(searchQ) && !r.name.toLowerCase().includes(searchQ) && !r.desc.includes(searchQ)) return false;
    return true;
  });
  rows.sort((a, b) => {
    const av = a[sortKey] || '', bv = b[sortKey] || '';
    return sortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
  });
  const tbody = document.getElementById('tbody');
  if (!rows.length) { tbody.innerHTML = '<tr><td colspan="4" class="empty">没有匹配的结果</td></tr>'; }
  else tbody.innerHTML = rows.map(r => `
    <tr>
      <td><span class="mod-name">${r.module}</span><span class="mod-badge ${MOD_CLASS[r.module]}">${MOD_LABEL[r.module]}</span></td>
      <td><span class="badge ${KIND_CLASS[r.kind]}">${KIND_LABEL[r.kind]}</span></td>
      <td class="item-name">${r.name}</td>
      <td class="desc">${r.desc}</td>
    </tr>`).join('');
  const cmd = rows.filter(r=>r.kind==='command').length;
  const evt = rows.filter(r=>r.kind==='event').length;
  const typ = rows.filter(r=>r.kind==='type').length;
  document.getElementById('stats').textContent = `共 ${rows.length} 条 · 命令 ${cmd} · 事件 ${evt} · 类型 ${typ}`;
}

// Tag filters
const tags = [{k:'all',l:'全部'},{k:'command',l:'命令'},{k:'event',l:'事件'},{k:'type',l:'类型'}];
document.getElementById('tag-filters').innerHTML = tags.map(t =>
  `<span class="ftag${t.k==='all'?' active':''}" data-k="${t.k}" onclick="setKind('${t.k}')">${t.l}</span>`
).join('');

function setKind(k) {
  filterKind = k;
  document.querySelectorAll('.ftag').forEach(el => el.classList.toggle('active', el.dataset.k === k));
  render();
}

render();
</script>
